{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <h2 class="mb-4 fw-bold">Tambah Retur Barang</h2>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="container mt-4">
                {% if messages %}
                    {% for message in messages %}
                    <div class="alert
                        {% if message.tags == 'error' %}
                            alert-danger
                        {% else %}
                            alert-{{ message.tags }}
                        {% endif %} mt-3 fw-semibold"
                        role="alert">
                        {{ message }}
                        <script>
                            setTimeout(function () {
                                document.querySelectorAll('.alert').forEach(function (alert) {
                                    alert.remove();
                                });
                            }, 3000);
                        </script>
                    </div>
                {% endfor %}
            {% endif %}
            <form method="POST">
                {% csrf_token %}            
                <div class="mb-3">
                    <label class="form-label fw-semibold">Pilih Barang</label>
                    <select name="barang" class="form-select select2" required>
                        <option value=""></option>
                        {% for barang in barangs %}
                            <option value="{{ barang.kode_barang }}">
                                {{ barang.nama_barang }} 
                            </option>
                        {% endfor %}
                    </select>
                </div>             
                <div class="mb-3">
                    <label class="form-label fw-semibold">Jumlah Retur</label>
                    <input type="number" 
                           name="jumlah" 
                           class="form-control" 
                           min="1" 
                           required>
                </div>             
                <div class="mb-3">
                    <label class="form-label fw-semibold">Alasan</label>
                    <select name="alasan" class="form-select" required>
                        <option value="rusak">Barang Rusak</option>
                        <option value="expired">Expired</option>
                        <option value="salah_kirim">Salah Kirim</option>
                        <option value="lainnya">Lainnya</option>
                    </select>
                </div>              
                <div class="mb-3">
                    <label class="form-label fw-semibold">Keterangan (Opsional)</label>
                    <textarea name="keterangan" 
                              class="form-control" 
                              rows="3"></textarea>
                </div>
            
                <button type="submit" class="btn btn-primary">
                    💾 Simpan Retur
                </button>

                <a href="{% url 'daftar_retur' %}" 
                   class="btn btn-secondary">
                    Kembali
                </a>
            </form>
        </div>
    </div>
</div>


<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>


<script>
    $(document).ready(function() {
        $('.select2').select2({
            placeholder: "Ketik nama barang...",
            allowClear: true
        });
    });
</script>


<style>
.select2-container {
    width: 100% !important;
}
</style>

{% endblock %}
