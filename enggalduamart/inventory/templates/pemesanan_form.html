{% extends 'base.html' %}
{% block title %}Pesan Barang{% endblock %}

{% block content %}
<h3 class="mb-3">Pesan Barang</h3>

<div class="card">
  <div class="card-body">
    <p><strong>Kode:</strong> {{ barang.kode_barang }}</p>
    <p><strong>Nama:</strong> {{ barang.nama_barang }}</p>
    <p><strong>Stok saat ini:</strong> {{ barang.stock }}</p>

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Jumlah Pesan</label>
        {{ form.jumlah }}
      </div>
      <button type="submit" class="btn btn-primary">Kirim Pesanan</button>
      <a href="{% url 'dashboard' %}" class="btn btn-secondary">Batal</a>
    </form>
  </div>
</div>
{% endblock %}
